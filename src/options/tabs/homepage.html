<section>
  <label>
    <span>Navigate to Homepage</span>
    <button class="keyBinder openPopup" placeholder="Set hotkey" id="redToHomeHotkey">
    </button>
    <button class="removeSetting">
    </button>
  </label>
</section>
<section>
  <h4>Hide</h4>
  <label>
    <span>Shorts</span>
    <input type="checkbox" id="hideShorts">
  </label>
  <label>
    <span>Mixes</span>
    <input type="checkbox" id="hideMixes">
  </label>
  <label>
    <span>Playables</span>
      <input type="checkbox" id="hidePlayables" />
    </label>
    <label>
      <span>'Top Live Games'</span>
    <input type="checkbox" id="hideTopLiveGames" />
  </label>
  <label>
    <span>Live streams</span>
    <button class="selectMenu openPopup rotableArrow" id="hideLiveStreams">
      <span>Off</span>
      <ul>
        <li value>Off</li>
        <li value="current">Current</li>
        <li value="completed">Completed (requires refresh)</li>
        <li value="both">Both</li>
      </ul>
    </button>
  </label>
  <label>
    <span>Upcoming videos</span>
    <input type="checkbox" id="hideUpcoming">
  </label>
  <label>
    <span>Topic bar</span>
    <input type="checkbox" id="hideRecommendationBar">
  </label>
  <label>
    <span>'Latest YouTube Posts'</span>
    <input type="checkbox" id="hideLatestYouTubePosts">
  </label>
  <label>
    <span>'Explore More Topics'</span>
    <input type="checkbox" id="hideExploreMoreTopics" />
  </label>
</section>
<section>
  <h4>Watched videos</h4>
  <label>
    <span>Hide watched videos</span>
    <button class="selectMenu openPopup rotableArrow" id="hideWatchVideos">
      <span>Off</span>
      <ul>
        <li value>Off</li>
        <li value="All videos">Watched %: 0-100</li>
        <li value="50-100%">Watched %: 50-100</li>
        <li value="70-100%">Watched %: 70-100</li>
        <li value="75-100%">Watched %: 75-100</li>
        <li value="80-100%">Watched %: 80-100</li>
        <li value="85-100%">Watched %: 85-100</li>
        <li value="90-100%">Watched %: 90-100</li>
        <li value="95-100%">Watched %: 95-100</li>
        <li value="Only fully-watched videos">Watched %: 100</li>
      </ul>
    </button>
  </label>
  <label>
    <span>Dim watched videos</span>
    <button class="selectMenu openPopup rotableArrow" id="dimWatchVideos">
      <span>Off</span>
      <ul>
        <li value>Off</li>
        <li value="dimAllVideos">Watched %: 0-100</li>
        <li value="50-100%">Watched %: 50-100</li>
        <li value="70-100%">Watched %: 70-100</li>
        <li value="75-100%">Watched %: 75-100</li>
        <li value="80-100%">Watched %: 80-100</li>
        <li value="85-100%">Watched %: 85-100</li>
        <li value="90-100%">Watched %: 90-100</li>
        <li value="95-100%">Watched %: 95-100</li>
        <li value="dimFullyWatchVideos">Watched %: 100</li>
      </ul>
    </button>
  </label>
  <div class="expandable">
    <label>
      <span>Video opacity</span>
      <input type="number" id="watchVideoOpacity" step="0.01" min="0" max="1" value="0.3">
      <button class="numInputBtn minus iconButton"></button>
      <button class="numInputBtn plus iconButton"></button>
    </label>
  </div>
</section>
