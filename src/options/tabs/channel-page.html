<section>
  <label>
    <span>Default to Videos tab</span>
    <input type="checkbox" id="videosAsDefaultTab">
  </label>
</section>
<section>
  <h4>Hide</h4>
  <label>
    <span>Home tab: Shorts</span>
    <input type="checkbox" id="hideShorts3">
  </label>
</section>
<section>
  <h4>Watched videos</h4>
  <label>
    <span>Videos tab: Hide watched videos</span>
    <button class="selectMenu openPopup rotableArrow" id="hideWatchVideos5">
      <span>Off</span>
      <ul>
        <li value>Off</li>
        <li value="All videos">Watched %: 0-100</li>
        <li value="50-100%">Watched %: 50-100</li>
        <li value="70-100%">Watched %: 70-100</li>
        <li value="75-100%">Watched %: 75-100</li>
        <li value="80-100%">Watched %: 80-100</li>
        <li value="85-100%">Watched %: 85-100</li>
        <li value="90-100%">Watched %: 90-100</li>
        <li value="95-100%">Watched %: 95-100</li>
        <li value="Only fully-watched videos">Watched %: 100</li>
      </ul>
    </button>
  </label>
  <label>
    <span>Videos tab: Dim watched videos</span>
    <button class="selectMenu openPopup rotableArrow" id="dimWatchVideos5">
      <span>Off</span>
      <ul>
        <li value>Off</li>
        <li value="dimAllVideos">Watched %: 0-100</li>
        <li value="50-100%">Watched %: 50-100</li>
        <li value="70-100%">Watched %: 70-100</li>
        <li value="75-100%">Watched %: 75-100</li>
        <li value="80-100%">Watched %: 80-100</li>
        <li value="85-100%">Watched %: 85-100</li>
        <li value="90-100%">Watched %: 90-100</li>
        <li value="95-100%">Watched %: 95-100</li>
        <li value="dimFullyWatchVideos">Watched %: 100</li>
      </ul>
    </button>
  </label>
  <div class="expandable">
    <label>
      <span>Video opacity</span>
      <input type="number" id="watchVideoOpacity5" step="0.01" min="0" max="1" value="0.3">
      <button class="numInputBtn minus iconButton"></button>
      <button class="numInputBtn plus iconButton"></button>
    </label>
  </div>
</section>
