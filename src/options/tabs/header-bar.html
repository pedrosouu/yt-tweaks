<section>
  <label>
    <span>Compact header bar</span>
    <input type="checkbox" id="compactHeaderBar">
  </label>
  <label>
    <span>Make logo redirect to another page</span>
    <input type="checkbox" id="ytLogoSubsPage">
  </label>
  <div class="expandable">
    <label>
      <span>Page</span>
      <button class="page" placeholder="Open a YouTube page" value="/feed/subscriptions" id="ylspPage">
      </button>
      <button class="removeSetting">
      </button>
    </label>
  </div>
  <label>
    <span>Open search results in new tab <span class="subLabel">Adds a 'Open in a new tab' button to the search
        box.</span>
    </span>
    <input type="checkbox" id="sResultsInNewTab">
  </label>
</section>
