<section>
  <label>
    <span>Search results in Grid view</span>
    <input type="checkbox" id="gridSearchResults">
  </label>
  <div class="expandable">
    <label>
      <span>Hide right sidebar</span>
      <input type="checkbox" id="hideRightSidebar">
    </label>
  </div>
</section>
<section>
  <h4>Hide</h4>
  <label>
    <span>Shorts</span>
    <input type="checkbox" id="hideShorts5">
  </label>
  <label>
    <span>Mixes</span>
    <input type="checkbox" id="hideMixes3">
  </label>
  <label>
    <span>Live streams</span>
    <button class="selectMenu openPopup rotableArrow" id="hideLiveStreams4">
      <span>Off</span>
      <ul>
        <li value>Off</li>
        <li value="current">Current</li>
        <li value="completed">Completed (requires refresh)</li>
        <li value="both">Both</li>
      </ul>
    </button>
  </label>
  <label>
    <span>Upcoming videos</span>
    <input type="checkbox" id="hideUpcoming3">
  </label>
  <label>
    <span>Irrelevant search results <span class="subLabel">For you, People also watched, Watch again... </span>
    </span>
    <input type="checkbox" id="hideSearchResults">
  </label>
</section>
<section>
  <h4>Watched videos</h4>
  <label>
    <span>Hide watched videos</span>
    <button class="selectMenu openPopup rotableArrow" id="hideWatchVideos4">
      <span>Off</span>
      <ul>
        <li value>Off</li>
        <li value="All videos">Watched %: 0-100</li>
        <li value="50-100%">Watched %: 50-100</li>
        <li value="70-100%">Watched %: 70-100</li>
        <li value="75-100%">Watched %: 75-100</li>
        <li value="80-100%">Watched %: 80-100</li>
        <li value="85-100%">Watched %: 85-100</li>
        <li value="90-100%">Watched %: 90-100</li>
        <li value="95-100%">Watched %: 95-100</li>
        <li value="Only fully-watched videos">Watched %: 100</li>
      </ul>
    </button>
  </label>
  <label>
    <span>Dim watched videos</span>
    <button class="selectMenu openPopup rotableArrow" id="dimWatchVideos4">
      <span>Off</span>
      <ul>
        <li value>Off</li>
        <li value="dimAllVideos">Watched %: 0-100</li>
        <li value="50-100%">Watched %: 50-100</li>
        <li value="70-100%">Watched %: 70-100</li>
        <li value="75-100%">Watched %: 75-100</li>
        <li value="80-100%">Watched %: 80-100</li>
        <li value="85-100%">Watched %: 85-100</li>
        <li value="90-100%">Watched %: 90-100</li>
        <li value="95-100%">Watched %: 95-100</li>
        <li value="dimFullyWatchVideos">Watched %: 100</li>
      </ul>
    </button>
  </label>
  <div class="expandable">
    <label>
      <span>Video opacity</span>
      <input type="number" id="watchVideoOpacity4" step="0.01" min="0" max="1" value="0.3">
      <button class="numInputBtn minus iconButton"></button>
      <button class="numInputBtn plus iconButton"></button>
    </label>
  </div>
</section>
