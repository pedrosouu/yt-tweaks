<section>
  <label>
    <span>Theater mode: Player height <span class="subLabel">Set how much vertical space the player takes up in
        Theater
        mode.</span></span>
    <input type="checkbox" id="fullscreenTheaterMode">
  </label>
  <div class="expandable">
    <label>
      <span>Height (%)</span>
      <input type="number" id="ftmHeight" min="0" max="100" step="1" value="100">
      <button class="numInputBtn minus iconButton"></button>
      <button class="numInputBtn plus iconButton"></button>
    </label>
    <label>
      <span>Auto-hide header</span>
      <input type="checkbox" checked id="ftmAutoHideHeader">
    </label>
  </div>
  <label>
    <span>Video focus <span class="subLabel">Darkens everything around the player except the chat when hovering
        it.</span>
    </span>
    <input type="checkbox" id="videoFocus">
  </label>
  <div class="expandable">
    <label>
      <span>Opacity</span>
      <input type="number" id="vfOpacity" min="0" max="1" step="0.01" value="0.9">
      <button class="numInputBtn minus iconButton"></button>
      <button class="numInputBtn plus iconButton"></button>
    </label>
    <label>
      <span>Blur (px)</span>
      <input type="number" id="vfBlur" min="0" value="0">
      <button class="numInputBtn minus iconButton"></button>
      <button class="numInputBtn plus iconButton"></button>
    </label>
  </div>
  <label>
    <span>Show video remaining time</span>
    <input type="checkbox" id="videoRemTime">
  </label>
  <div class="expandable">
    <label>
      <span>Where?</span>
      <button class="selectMenu openPopup rotableArrow" id="whereToShowTime">
        <span>Player</span>
        <ul>
          <li value="player">Player</li>
          <li value="tabTitle">Tab title</li>
        </ul>
      </button>
    </label>
    <label>
      <span>Format</span>
      <button class="selectMenu openPopup rotableArrow" id="timeFormat">
        <span>23:06</span>
        <ul>
          <li value="left">23:06</li>
          <li value="left%">50%</li>
          <li value="left+left%">23:06 (50%)</li>
        </ul>
      </button>
    </label>
  </div>
  <label>
    <span>Force original audio track</span>
    <input type="checkbox" id="forceOgAudio">
  </label>
  <label>
    <span>Pause the previous video when another starts playing</span>
    <input type="checkbox" id="playOneVideoAtAtime">
  </label>
  <div class="expandable">
    <label>
      <span>Automatic resume</span>
      <input type="checkbox" id="autoResume">
    </label>
  </div>
  <label>
    <span>Auto-scroll Shorts <span class="subLabel">Autoplays the next short when the first has
        finished.</span></span>
    <input type="checkbox" id="autoScrollShorts">
  </label>
  <label>
    <span>Toggle loop</span>
    <button class="keyBinder openPopup" placeholder="Set hotkey" id="toggleLoopHotkey">
    </button>
    <button class="removeSetting">
    </button>
  </label>
</section>
<section>
  <h4>Disable</h4>
  <label>
    <span>'Video paused. Continue watching?'</span>
    <input type="checkbox" id="disableAutoPause">
  </label>
  <label>
    <span>Number keys shortcuts</span>
    <input type="checkbox" id="disableNumHotkeys">
  </label>
  <div class="expandable">
    <label>
      <span>Top row</span>
      <button class="selectMenu openPopup rotableArrow" id="dnhTopRow">
        <span>0-9</span>
        <ul>
          <li value>Off</li>
          <li value="0-9" class="selected">0-9</li>
          <li value="1-9">1-9</li>
          <li value="0">0</li>
        </ul>
      </button>
    </label>
    <label>
      <span>Numpad</span>
      <button class="selectMenu openPopup rotableArrow" id="dnhNumpad">
        <span>0-9</span>
        <ul>
          <li value>Off</li>
          <li value="0-9" class="selected">0-9</li>
          <li value="1-9">1-9</li>
          <li value="0">0</li>
        </ul>
      </button>
    </label>

      <span>Home</span>
      <input type="checkbox" id="dnhHome" checked>
    </label>
    <label>
      <span>End</span>
      <input type="checkbox" id="dnhEnd" checked>

    <span>Auto-play in playlists</span>
    <input type="checkbox" id="disablePlAutoPlay">

<section>
  <h4>Progress bar</h4>
  <label>
    <span>Always show progress bar</span>
    <input type="checkbox" id="alwaysShowProgBar">
  </label>
  <div class="expandable">
    <label>
      <span>Pinned to the bottom</span>
      <input type="checkbox" id="keepProgBarAtBottom">
    </label>
    <label>
      <span>Outside the player</span>
      <input type="checkbox" id="showProgBarOutsidePlayer">
    </label>
    <label>
      <span>Opacity</span>
      <input type="number" id="progBarOpacity" step="0.01" min="0" max="1" value="1">
      <button class="numInputBtn minus iconButton"></button>
      <button class="numInputBtn plus iconButton"></button>
    </label>
  </div>
  <label>
    <span>Custom progress bar</span>
    <button class="selectMenu openPopup rotableArrow" id="customProgBar">
      <span>Off</span>
      <ul>
        <li value>Off</li>
        <li value="solidColor">Solid color</li>
        <li value="nyanCat">Nyan cat</li>
        <li value="pacMan">Pac-Man</li>
        <li value="lightSaber">Lightsaber</li>
      </ul>
    </button>
  </label>
  <div class="expandable">
    <div class="expandable" matcher="solidColor|lightSaber">
      <label>
        <span>Color</span>
        <button class="colorPicker openPopup" id="progBarColor" style="--selectedColor: hsla(204, 100%, 50%, 1);">
          <div class="checker"></div>
          <div class="selectedColor"></div>
        </button>
      </label>
    </div>
  </div>
</section>
<section>
  <h4>Video snapshot</h4>

    <span>Snapshot format</span>
    <button class="selectMenu openPopup rotableArrow" id="snapshotFormat">

  <label>

  <label>
    <span>Snapshot to clipboard</span>
    <button class="keyBinder openPopup" placeholder="Set hotkey" id="snapshotToClipHotkey">

    <button class="removeSetting">
    </button>
  </label>
  <label>
    <span>Snapshot to file and clipboard</span>

    </button>

<section>

        <li value="Bottom left">Bottom left</li>

        <li value="Top left">Top left</li>

  <div class="expandable">
    <div class="expandable" matcher="Top">

        <span>Below header</span>

  </div>
  <label>
    <span>Floating (px)</span>

  </label>

<section>
  <h4>Video seeking</h4>
  <label>
    <span>Seek by scrolling over video player</span>
    <input type="checkbox" id="seekOnScroll">
  </label>
  <div class="expandable">
    <label title="Negative number = reversed mouse wheel direction">
      <span>Forward (seconds)</span>
      <input type="number" id="seekOnScrollFtime" step="1" value="5">
      <button class="numInputBtn minus iconButton"></button>
      <button class="numInputBtn plus iconButton"></button>
    </label>
    <label title="Negative number = reversed mouse wheel direction">
      <span>Backward (seconds)</span>
      <input type="number" id="seekOnScrollBtime" step="1" value="5">
      <button class="numInputBtn minus iconButton"></button>
      <button class="numInputBtn plus iconButton"></button>
    </label>
    <label>
      <span>Require holding</span>
      <button class="selectMenu openPopup rotableArrow" id="seekOnScrollModifier">
        <span>Off</span>
        <ul>
          <li value>Off</li>
          <li value="1">Left mouse button</li>
          <li value="2">Right mouse button</li>
          <li value="ctrlKey">Ctrl</li>
          <li value="shiftKey">Shift</li>
          <li value="altKey">Alt</li>
        </ul>
      </button>
    </label>
    </label>
  </div>
  <label>
    <span>Seek forward</span>
    <button class="list openPopup" listType="hotkey+number" number-value="3" number-title="Seconds" number-min="0"
      number-step="1" id="seekFhotkeys">
      <span>Hotkeys</span>
    </button>
  </label>
  <label>
    <span>Seek backward</span>
    <button class="list openPopup" listType="hotkey+number" number-value="3" number-title="Seconds" number-min="0"
      number-step="1" id="seekBhotkeys">
      <span>Hotkeys</span>
    </button>
  </label>
  <label>
    <span>Undo seek</span>
    <button class="keyBinder openPopup" placeholder="Set hotkey" id="undoSeekHotkey">
    </button>
    <button class="removeSetting">
    </button>
  </label>
  <div class="expandable">
    <label>
      <span>Redo seek</span>
      <button class="keyBinder openPopup" placeholder="Set hotkey" id="redoSeekHotkey">
      </button>
      <button class="removeSetting">
      </button>
    </label>
  </div>
  <label>
    <span>Type a number and press Enter to seek to that time<span class="subLabel">E.g. 1 + 3 + 0 + Enter will seek
        to
        1 minute and 30 seconds.</span></span>
    <input type="checkbox" id="numbersThenEnter">
  </label>
  <label>
    <span>Type a number and press left/right arrow key to seek by that amount of time<span class="subLabel">E.g. 1
        + 5 + right arrow key will seek forward by 15 seconds.</span></span>
    <input type="checkbox" id="numbersThenArrowKey">
  </label>
</section>
<section>
  <h4>Video speed</h4>
  <label>
    <span>Default video speed</span>
    <input type="checkbox" id="videoSpeed">
  </label>
  <div class="expandable">
    <label>
      <span>Speed</span>
      <input type="number" id="vsSpeed" min="0" value="1.5" step="0.05">

  </div>
  <label>
    <span>Scroll speed over video player</span>
    <input type="checkbox" id="changeSpeedOnScroll">

  <div class="expandable">
    <label title="Negative number = reversed mouse wheel direction">
      <span>Speed change step (x)</span>
      <input type="number" id="speedChangePerScroll" step="0.01" value="0.05">
      <button class="numInputBtn minus iconButton"></button>
      <button class="numInputBtn plus iconButton"></button>
    </label>
    <label>
      <span>Require holding</span>
      <button class="selectMenu openPopup rotableArrow" id="changeSpeedOnScrollModifier">
        <span>Off</span>
        <ul>
          <li value>Off</li>
          <li value="1">Left mouse button</li>
          <li value="2">Right mouse button</li>
          <li value="ctrlKey">Ctrl</li>
          <li value="shiftKey">Shift</li>
          <li value="altKey">Alt</li>
        </ul>
      </button>
    </label>
    <label>
      <span>Return to normal speed</span>
      <button class="selectMenu openPopup rotableArrow" id="resetSpeedOnPlayerClick">
        <span>Off</span>
        <ul>
          <li value>Off</li>
          <li value="leftClick">Left-click</li>
          <li value="rightClick">Right-click</li>
          <li value="middleClick">Middle-click</li>
        </ul>
      </button>
    </label>
    <div class="expandable">
      <label>
        <span>Require holding</span>
        <button class="selectMenu openPopup rotableArrow" id="resetSpeedOnPlayerClickModifier">
          <span>Off</span>
          <ul>
            <li value>Off</li>
            <li value="1">Left mouse button</li>
            <li value="2">Right mouse button</li>
            <li value="ctrlKey">Ctrl</li>
            <li value="shiftKey">Shift</li>
            <li value="altKey">Alt</li>
          </ul>
        </button>
      </label>

  <label>
    <span>Type a number and press Shift to set speed to that number<span class="subLabel">E.g. 1 + 2 + 5 + Shift

    <input type="checkbox" id="numbersThenShift">

  <label>
    <span>Increase speed</span>
    <button class="list openPopup" listType="hotkey+number" number-value="0.05" number-title="Step change"
      number-min="0" number-step="0.05" id="increaseSpeedHotkeys">
      <span>Hotkeys</span>
    </button>
  </label>
  <label>
    <span>Decrease speed</span>
    <button class="list openPopup" listType="hotkey+number" number-value="0.05" number-title="Step change"
      number-min="0" number-step="0.05" id="decreaseSpeedHotkeys">
      <span>Hotkeys</span>
    </button>
  </label>
  <label>
    <span>Normal speed</span>
    <button class="keyBinder openPopup" placeholder="Set hotkey" id="resetSpeedHotkey">
    </button>
    <button class="removeSetting">
    </button>
  </label>
  <label>
    <span>Custom speed</span>
    <button class="list openPopup" listType="hotkey+number" number-value="2" number-title="Speed" number-min="0"

      <span>Hotkeys</span>

  <label>

    <input type="checkbox" id="channelSpeedButton">
  </label>
  <label>
    <span>Set channel speed</span>
    <button class="keyBinder openPopup" placeholder="Set hotkey" id="setChannelSpeedHotkey">
    </button>
    <button class="removeSetting">
    </button>
  </label>
