<section>
  <label>
    <span>Items per row<span class="subLabel">Control how many videos, shorts and posts appear per
        row.</span></span>
    <input type="checkbox" id="videosPerRow">
  </label>
  <div class="expandable">
    <label section="header">
      <h4>Videos</h4>
    </label>
    <label section="content">
      <span>Maximum number of columns</span>
      <button class="selectMenu openPopup rotableArrow" id="maxNumOfColumns">
        <span>6</span>
        <ul>
          <li value="1">1</li>
          <li value="2">2</li>
          <li value="3">3</li>
          <li value="4">4</li>
          <li value="5">5</li>
          <li value="6" class="selected">6</li>
          <li value="7">7</li>
          <li value="8">8</li>
          <li value="9">9</li>
          <li value="10">10</li>
          <li value="11">11</li>
          <li value="12">12</li>
          <li value="13">13</li>
          <li value="14">14</li>
          <li value="15">15</li>
        </ul>
      </button>
    </label>
    <label section="content">
      <span>Minimum column width (px)</span>
      <input type="number" id="minColumnWidth" value="270">
      <button class="numInputBtn minus iconButton"></button>
      <button class="numInputBtn plus iconButton"></button>
    </label>
    <label section="header">
      <h4>Shorts</h4>
    </label>
    <label section="content">
      <span>Maximum number of columns</span>
      <button class="selectMenu openPopup rotableArrow" id="maxNumOfColumns2">
        <span>12</span>
        <ul>
          <li value="1">1</li>
          <li value="2">2</li>
          <li value="3">3</li>
          <li value="4">4</li>
          <li value="5">5</li>
          <li value="6">6</li>
          <li value="7">7</li>
          <li value="8">8</li>
          <li value="9">9</li>
          <li value="10">10</li>
          <li value="11">11</li>
          <li value="12" class="selected">12</li>
        </ul>
      </button>
    </label>
    <label section="content">
      <span>Minimum column width (px)</span>
      <input type="number" id="minColumnWidth2" value="170">
      <button class="numInputBtn minus iconButton"></button>
      <button class="numInputBtn plus iconButton"></button>
    </label>
    <label section="header">
      <h4>Posts</h4>
    </label>
    <label section="content">
      <span>Maximum number of columns</span>
      <button class="selectMenu openPopup rotableArrow" id="maxNumOfColumns3">
        <span>6</span>
        <ul>
          <li value="1">1</li>
          <li value="2">2</li>
          <li value="3">3</li>
          <li value="4">4</li>
          <li value="5">5</li>
          <li value="6" class="selected">6</li>
        </ul>
      </button>
    </label>
    <label section="content">
      <span>Minimum column width (px)</span>
      <input type="number" id="minColumnWidth3" value="326">
      <button class="numInputBtn minus iconButton"></button>
      <button class="numInputBtn plus iconButton"></button>
    </label>
  </div>
  <label>
    <span>Hide profile pictures</span>
    <input type="checkbox" id="hideProfilePictures">
  </label>

  <label>
    <span>Decrease font size</span>
    <input type="checkbox" id="decreaseFontSize">
  </label>
</section>
